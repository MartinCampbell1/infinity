name: Critical Coverage Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  critical-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run qa:critical-coverage:test

      - run: npm run qa:critical-coverage
